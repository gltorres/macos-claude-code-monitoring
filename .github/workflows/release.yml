name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build DMG and publish release
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Detect signing capability
        id: signing
        run: |
          if [ -n "${{ secrets.APPLE_DEVELOPER_ID_P12 }}" ] \
              && [ -n "${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}" ] \
              && [ -n "${{ secrets.AC_NOTARY_PROFILE }}" ]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Release secrets not present — building unsigned DMG."
          fi

      - name: Import signing certificate
        if: steps.signing.outputs.signed == 'true'
        env:
          P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          NOTARY_PROFILE: ${{ secrets.AC_NOTARY_PROFILE }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          P12_PATH="$RUNNER_TEMP/cert.p12"
          echo "$P12_BASE64" | base64 --decode > "$P12_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Restore notarytool profile
          echo "$NOTARY_PROFILE" | base64 --decode > "$RUNNER_TEMP/AC_NOTARY.json"
          xcrun notarytool store-credentials AC_NOTARY \
            --apple-id "$(jq -r .apple_id < "$RUNNER_TEMP/AC_NOTARY.json")" \
            --team-id "$(jq -r .team_id < "$RUNNER_TEMP/AC_NOTARY.json")" \
            --password "$(jq -r .app_password < "$RUNNER_TEMP/AC_NOTARY.json")"

      - name: Build signed DMG
        if: steps.signing.outputs.signed == 'true'
        run: ./scripts/build-release.sh

      - name: Build unsigned DMG
        if: steps.signing.outputs.signed != 'true'
        run: |
          xcodebuild -project ClaudeMon.xcodeproj -scheme ClaudeMon \
              -configuration Release -derivedDataPath .build/dd build \
              CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          mkdir -p .build
          hdiutil create -volname ClaudeMon \
              -srcfolder .build/dd/Build/Products/Release/ClaudeMon.app \
              -ov -format UDZO .build/ClaudeMon.dmg

      - name: Extract changelog section
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk -v tag="$TAG" '
            /^## \[/ {
              if (in_section) exit
              if (index($0, "[" tag "]")) { in_section=1; next }
            }
            in_section { print }
          ' CHANGELOG.md > .build/release-notes.md
          if [ ! -s .build/release-notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > .build/release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/ClaudeMon.dmg
          body_path: .build/release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
